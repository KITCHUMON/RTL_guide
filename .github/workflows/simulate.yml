name: Simulate All RTL Modules

on:
 push:
 branches: [ main ]
 workflow_dispatch:

jobs:
 simulate:
 runs-on: ubuntu-latest
 
 steps:
 - uses: actions/checkout@v3
 
 - name: Install Verilog tools
 run: |
 sudo apt update
 sudo apt install -y iverilog gtkwave
 
 - name: Find all gate modules
 id: find_modules
 run: |
 # Find all directories ending with "_gate"
 modules=$(find rtl -type d -name "*_gate" | tr '\n' ' ')
 echo "modules=$modules" >> $GITHUB_OUTPUT
 
 - name: Run simulations
 run: |
 # Create results directory
 mkdir -p results
 
 # Process each module directory
 for module_dir in ${{ steps.find_modules.outputs.modules }}; do
 module_name=$(basename $module_dir)
 echo "Testing $module_name..."
 
 # Find files in this module directory
 rtl_file=$(find "$module_dir" -name "*.v" | grep -v tb | head -1)
 tb_file=$(find "$module_dir" -name "tb_*.v" | head -1)
 
 # Alternative: Try your specific naming pattern
 if [ -z "$rtl_file" ]; then
 rtl_file=$(find "$module_dir" -name "${module_name}.v" | head -1)
 fi
 
 if [ -z "$tb_file" ]; then
 tb_file=$(find "$module_dir" -name "tb_${module_name}.v" | head -1)
 fi
 
 # Check if we found both files
 if [ -f "$rtl_file" ] && [ -f "$tb_file" ]; then
 # Create module-specific results directory
 mkdir -p "results/$module_name"
 
 # Compile
 if iverilog -o "results/$module_name/sim_$module_name.vvp" \
 "$rtl_file" "$tb_file"; then
 
 # Run simulation
 vvp "results/$module_name/sim_$module_name.vvp" +vcd="results/$module_name/sim_$module_name.vcd" +logfile="results/$module_name/log_$module_name.txt"
 echo " $module_name: Success"
 else
 echo "$module_name: Compilation failed"
 fi
 else
 echo "$module_name: Missing RTL or testbench file"
 fi
done
 
 - name: Upload results
 uses: actions/upload-artifact@v4
 with:
 name: simulation-results
 path: results/
